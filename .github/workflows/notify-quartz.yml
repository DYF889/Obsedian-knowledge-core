name: Notify Quartz site to rebuild

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".obsidian/**"
      - ".github/**"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Quartz repository_dispatch
        env:
          DISPATCH_TOKEN: ${{ secrets.QUARTZ_DISPATCH_TOKEN }}
        run: |
          curl -sS -f -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/DYF889/dyf889.github.io/dispatches \
            -d '{"event_type":"vault-updated"}'
          echo "Dispatched vault-updated event to dyf889.github.io"
